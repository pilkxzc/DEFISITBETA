name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it helps us fix things faster.

  - type: input
    id: version
    attributes:
      label: DEFIS Version
      description: Found in Settings or the title bar
      placeholder: "1.0.4"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux (AppImage)
        - Linux (Arch)
        - macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open profile "..."
        2. Navigate to "..."
        3. Click "..."
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "X should happen."
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Profile isolation
        - Anti-detection
        - AI Agent
        - Chrome Extensions
        - Proxy
        - Server sync
        - Tab management
        - UI / keyboard shortcuts
        - Build / installer
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant console output or error messages. DevTools → Console (Ctrl+Shift+I).
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help — proxy type, extension name, AI provider, etc.
