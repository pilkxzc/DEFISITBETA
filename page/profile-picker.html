<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DEFIS — Профілі</title>
    <style>
        :root {
            --bg:      #030303;
            --surface: #0e0e0e;
            --card:    #111111;
            --card-h:  #161616;
            --b1:      #1a1a1a;
            --b2:      #2a2a2a;
            --text:    #e0e0e0;
            --muted:   #555555;
            --accent:  #8c32d4;
            --accent-h:#9d3fe8;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-app-region: drag;
        }

        /* ── Titlebar ─────────────────────────────────────────────── */
        .tb {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            border-bottom: 1px solid var(--b1);
            flex-shrink: 0;
        }
        .tb-logo {
            width: 24px; height: 24px;
            border-radius: 4px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }
        .tb-logo img { width: 24px; height: 24px; object-fit: contain; }
        .tb-title {
            font-size: 11px; font-weight: 700;
            letter-spacing: .08em;
            color: var(--text);
        }
        .tb-spacer { flex: 1; }
        .tb-close {
            -webkit-app-region: no-drag;
            background: transparent; border: none;
            color: var(--muted); cursor: pointer;
            width: 28px; height: 28px;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s;
        }
        .tb-close:hover { background: #e81123; color: #fff; }

        /* ── Search bar ────────────────────────────────────────────── */
        .search-bar {
            -webkit-app-region: no-drag;
            padding: 10px 16px 0;
            flex-shrink: 0;
        }
        .search-input {
            width: 100%;
            background: var(--b1);
            border: 1px solid var(--b2);
            border-radius: 8px;
            padding: 7px 12px 7px 34px;
            color: var(--text);
            font-size: 12px;
            font-family: var(--font);
            transition: border-color .2s, background .2s;
            position: relative;
        }
        .search-input:focus { border-color: var(--accent); background: #141414; }
        .search-wrap {
            position: relative;
        }
        .search-wrap svg {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
        }

        /* ── Sub-header ───────────────────────────────────────────── */
        .sub-header {
            -webkit-app-region: no-drag;
            padding: 8px 16px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sub-heading { font-size: 12px; font-weight: 600; color: var(--text); }
        .sub-count   { font-size: 11px; color: var(--muted); }

        /* ── Content ──────────────────────────────────────────────── */
        .content {
            flex: 1;
            padding: 0 16px 16px;
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

        /* ── Grid of profile cards ────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
            gap: 8px;
            padding-top: 4px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--b1);
            border-radius: 10px;
            padding: 16px 10px 12px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: background .15s, border-color .15s, transform .1s;
            user-select: none;
            position: relative;
        }
        .card:hover       { background: var(--card-h); border-color: var(--b2); }
        .card:active      { transform: scale(.97); }
        .card.busy        { opacity: .6; pointer-events: none; }
        .card.selected    { border-color: var(--accent); background: rgba(140,50,212,.06); }

        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: #fff;
            flex-shrink: 0;
            position: relative;
        }

        /* proxy status dot on avatar */
        .proxy-dot {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .pname {
            font-size: 12px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            width: 100%;
            color: var(--text);
        }

        /* badges row */
        .badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .badge {
            font-size: 9px; padding: 2px 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.06);
            white-space: nowrap;
        }

        .hint {
            font-size: 10px; color: var(--accent);
            opacity: 0; transition: opacity .15s;
        }
        .card:hover .hint { opacity: 1; }

        /* spinner overlay while opening */
        .card-spin {
            position: absolute; inset: 0;
            background: rgba(0,0,0,.5);
            border-radius: 10px;
            display: none; align-items: center; justify-content: center;
        }
        .card.busy .card-spin { display: flex; }
        .sp {
            width: 18px; height: 18px;
            border: 2px solid rgba(140,50,212,.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Add-profile card ─────────────────────────────────────── */
        .add-card {
            background: transparent;
            border: 1px dashed var(--b2);
            border-radius: 10px;
            padding: 16px 10px 12px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 120px;
            transition: background .15s, border-color .15s;
            user-select: none;
        }
        .add-card:hover { background: rgba(140,50,212,.05); border-color: var(--accent); }
        .add-card svg, .add-card span  { color: var(--muted); }
        .add-card:hover svg, .add-card:hover span { color: var(--accent); }
        .add-card span { font-size: 11px; }

        /* ── Empty state ──────────────────────────────────────────── */
        .empty {
            grid-column: 1 / -1;
            padding: 40px 0;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .err { font-size: 11px; color: #e07070; margin-top: 12px; display: none; padding: 0 16px; }
    </style>
</head>
<body>

    <!-- Titlebar -->
    <div class="tb">
        <div class="tb-logo">
            <img src="logo.png" alt="D">
        </div>
        <span class="tb-title">DEFIS</span>
        <div class="tb-spacer"></div>
        <button class="tb-close" id="btnClose" title="Закрити">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 1L9 9M9 1L1 9"/>
            </svg>
        </button>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
            </svg>
            <input class="search-input" id="searchInput" type="text" placeholder="Пошук профілів…" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <!-- Sub-header -->
    <div class="sub-header">
        <span class="sub-heading">Оберіть профіль</span>
        <span class="sub-count" id="countLabel"></span>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="grid" id="grid"></div>
        <div class="err" id="err"></div>
    </div>

    <script>
        const grid        = document.getElementById('grid');
        const err         = document.getElementById('err');
        const searchInput = document.getElementById('searchInput');
        const countLabel  = document.getElementById('countLabel');

        let allProfiles = [];
        let selectedIdx = -1;
        let visibleCards = [];

        function initials(name) {
            return (name || '?').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() || '??';
        }

        function osLabel(os) {
            if (!os) return '';
            const m = { win11:'Win11', win10:'Win10', macos:'macOS', linux:'Linux' };
            return m[os] || os;
        }

        function browserLabel(p) {
            const bv = p.browserVersion || p.browser_version || '';
            if (!bv) return '';
            const num = bv.replace(/chrome/i, '').replace(/[^0-9]/g, '');
            return num ? `Chr ${num}` : bv;
        }

        async function openProfile(id, card) {
            card.classList.add('busy');
            try {
                await window.pickerApi.openProfile(id);
            } catch {
                card.classList.remove('busy');
                err.textContent = 'Не вдалося відкрити профіль';
                err.style.display = 'block';
            }
        }

        function renderGrid(filter) {
            const lc = (filter || '').toLowerCase();
            const filtered = allProfiles.filter(p =>
                !lc || p.name.toLowerCase().includes(lc) || (p.id || '').toLowerCase().includes(lc)
            );

            // Update count label
            countLabel.textContent = lc
                ? `${filtered.length} / ${allProfiles.length} профілів`
                : `${allProfiles.length} профілів`;

            // Clear grid
            grid.innerHTML = '';
            visibleCards = [];
            selectedIdx = -1;

            if (!filtered.length && lc) {
                grid.innerHTML = '<div class="empty">Нічого не знайдено</div>';
            }

            filtered.forEach((p, i) => {
                const proxyOn = !!p.proxy?.enabled;
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = -1;

                const proxyDotColor = proxyOn ? '#28c840' : 'transparent';
                const osl = osLabel(p.os);
                const bvl = browserLabel(p);

                card.innerHTML = `
                    <div class="avatar" style="background:${p.color || '#9d7cce'}">
                        ${initials(p.name)}
                        <span class="proxy-dot" style="background:${proxyDotColor}" title="${proxyOn ? 'Proxy enabled' : ''}"></span>
                    </div>
                    <div class="pname" title="${p.name}">${p.name || p.id}</div>
                    <div class="badges">
                        ${osl ? `<span class="badge">${osl}</span>` : ''}
                        ${bvl ? `<span class="badge">${bvl}</span>` : ''}
                        ${proxyOn ? '<span class="badge" style="color:#28c840;background:rgba(40,200,64,0.1);border-color:rgba(40,200,64,0.2)">Proxy</span>' : ''}
                    </div>
                    <div class="hint">Відкрити →</div>
                    <div class="card-spin"><div class="sp"></div></div>
                `;

                card.addEventListener('click', () => openProfile(p.id, card));
                grid.appendChild(card);
                visibleCards.push(card);
            });

            // "Add new profile" card
            const add = document.createElement('div');
            add.className = 'add-card';
            add.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="10" cy="10" r="8.25"/>
                    <path d="M10 6.5v7M6.5 10h7"/>
                </svg>
                <span>Новий профіль</span>
            `;
            add.addEventListener('click', () => window.pickerApi.createProfile());
            grid.appendChild(add);
        }

        // Keyboard navigation
        function updateSelection(newIdx) {
            visibleCards.forEach(c => c.classList.remove('selected'));
            selectedIdx = Math.max(0, Math.min(newIdx, visibleCards.length - 1));
            if (visibleCards[selectedIdx]) {
                visibleCards[selectedIdx].classList.add('selected');
                visibleCards[selectedIdx].scrollIntoView({ block: 'nearest' });
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                window.pickerApi.close();
                return;
            }

            if (!visibleCards.length) return;

            // Arrow navigation
            const cols = Math.round(grid.offsetWidth / (148 + 8)) || 1;

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                updateSelection(selectedIdx < 0 ? 0 : selectedIdx + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                updateSelection(selectedIdx <= 0 ? 0 : selectedIdx - 1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                updateSelection(selectedIdx < 0 ? cols : selectedIdx + cols);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                updateSelection(selectedIdx < cols ? 0 : selectedIdx - cols);
            } else if (e.key === 'Enter' && selectedIdx >= 0) {
                e.preventDefault();
                visibleCards[selectedIdx]?.click();
            }
        });

        searchInput.addEventListener('input', () => {
            renderGrid(searchInput.value);
        });

        // Focus search on start, but don't steal keyboard nav
        searchInput.addEventListener('keydown', e => {
            if (['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) {
                searchInput.blur();
            }
        });

        async function init() {
            try {
                allProfiles = await window.pickerApi.getProfiles();
            } catch {
                err.textContent = 'Не вдалося завантажити профілі';
                err.style.display = 'block';
                return;
            }
            renderGrid('');
            setTimeout(() => searchInput.focus(), 80);
        }

        document.getElementById('btnClose').addEventListener('click', () => window.pickerApi.close());

        init();
    </script>

</body>
</html>
